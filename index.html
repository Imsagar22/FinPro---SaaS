<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Some libraries try to overwrite window.fetch in restricted environments.
      // This protective wrapper prevents the crash by intercepting the assignment.
      (function() {
        var originalFetch = window.fetch;
        if (originalFetch && !Object.getOwnPropertyDescriptor(window, 'fetch').set) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Blocked attempt to overwrite read-only fetch property.'); },
            configurable: true
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
